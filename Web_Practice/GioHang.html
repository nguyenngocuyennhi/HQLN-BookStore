<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./CSS/GioHang.css" />
</head>
<body>
    <h2 class="text-center fw-bold my-4">GIỎ HÀNG</h2>
    <div class="container">
        <div class="row g-4">
            <!-- LEFT -->
            <div class="col-lg-8">
                <div class="table-responsive shadow-sm p-3 bg-white rounded">
                    <table class="table align-middle text-center">
                        <thead class="table-light">
                            <tr>
                                <!-- CHỌN -->
                                <th>Chọn</th>
                                <th>Ảnh</th>
                                <th>Tên</th>
                                <th>Giá</th>
                                <th>Số lượng</th>
                                <th>Tổng</th>
                                <th>Xóa</th>
                            </tr>
                        </thead>
                        <tbody id="cart"></tbody>
                    </table>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="col-lg-4">
                <div class="shadow-sm p-4 bg-white rounded">
                    <h4 class="fw-bold mb-4">
                        Tổng đơn hàng
                    </h4>
                    <!-- KHU VỰC -->
                    <div class="mb-3">
                        <label class="form-label">Khu vực:</label>
                        <select id="area" class="form-select" onchange="renderCart()">
                            <option value="city">
                                Nội thành
                            </option>
                            <option value="near">
                                Tỉnh gần
                            </option>
                            <option value="far">
                                Tỉnh xa
                            </option>
                        </select>
                    </div>
                    <!-- GIAO HÀNG -->
                    <div class="mb-3">
                        <label class="form-label">
                         Giao hàng:
                        </label>
                        <select id="speed" class="form-select" onchange="renderCart()" >
                            <option value="normal">
                                Thường
                            </option>
                            <option value="fast">
                                Nhanh
                            </option>
                        </select>
                    </div>
                    <hr>
                    <p class="d-flex justify-content-between">
                        <span>Tạm tính:</span>
                        <span id="subtotal">
                            0đ
                        </span>
                    </p>
                    <p class="d-flex justify-content-between">
                        <span>Ship:</span>
                        <span id="ship">
                            0đ
                        </span>
                    </p>
                    <hr>
                    <h4 class="d-flex justify-content-between fw-bold">
                        <span>Tổng:</span>
                        <span id="total">
                            0đ
                        </span>
                    </h4>
                    <button class="btn btn-dark w-100 mt-3" onclick="goCheckout()">
                        Thanh toán
                    </button>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/main.js"></script>
</body>
</html>
